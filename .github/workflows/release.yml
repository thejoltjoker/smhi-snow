# Release Please opens/updates a Release PR on each push to main.
# Merging that PR creates a GitHub Release and publishes to npm.
#
# One-time npm setup (after the package exists on npm):
#   npm trust github smhi-snow --file=release.yml --repository=thejoltjoker/smhi-snow --allow-publish
#
# Publish runs in this same workflow because releases created with GITHUB_TOKEN
# do not trigger separate workflow runs.
#
# Requires:
# - Settings → Actions → General → Workflow permissions: Read and write
# - Secret RELEASE_PLEASE_TOKEN (fine-grained PAT on this repo):
#   Contents R/W, Pull requests R/W, Workflows R/W, Metadata R
#   Workflows is required when the release includes .github/workflows changes.
name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          target-branch: main
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        # Provenance is generated automatically via npm trusted publishing (OIDC).
        run: npm publish
